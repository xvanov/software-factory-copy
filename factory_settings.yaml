caps:
  # Multi-app parallelism cap. 10 is generous — each agent runs in its
  # own git worktree under ``state/worktrees/`` so there's no shared
  # working-tree contention. Higher caps work fine if hardware + hourly
  # spend allow.
  global_concurrent_agents: 10
  # Per-repo cap — now decoupled from working-tree contention thanks to
  # ``factory.chain.worktree``. Each in-flight story gets its own
  # private worktree on disk so 5 stories can run in parallel against a
  # single app without racing on ``ensure_feature_branch``.
  per_repo_concurrent_agents: 5
  daily_spend_usd: 100
  hourly_spend_usd: 15
queues:
  human_review_max_open_prs: 5
  failing_ci_pause_threshold: 3
rate_limits:
  pm_invocations_per_hour: 4
  ralph_runs_per_day: 24
  bug_hunter_runs_per_day: 2
  security_runs_per_day: 1
  ux_auditor_runs_per_day: 2
modes:
  default: normal
  available: [normal, fix-only, drain-reviews, paused, exploratory, deploy-frozen, ux-audit-only]
direction_defaults:
  require_user_flow_for_ui: true
  require_api_spec_for_backend: true
  allow_explore_tag: true
  max_dev_retries: 3
  escalate_model_on_retry: true
  require_context_update_per_pr: true
  enforce_canonical_doc_paths: true
# End-of-tick auto-merge worker. When ``enabled`` is true,
# ``factory tick`` calls ``auto_merge_tick`` after every story handler
# runs and merges PRs whose chain gates have passed. ``wait_for_ci``
# uses ``gh pr merge --auto`` so GitHub holds the merge until required
# checks pass; for repos without required checks the merge happens
# immediately.
auto_merge:
  enabled: true
  trigger: end_of_tick
  merge_method: squash
  delete_branch_after_merge: true
  wait_for_ci: true
# Phase 6 scheduled personas. ``factory tick`` consults this on every run
# and dispatches due entries via ``factory.chain.scheduled_tasks``. Rate
# limits referenced by ``rate_limit_key`` look up the same-named field in
# ``rate_limits:`` above.
schedules:
  - name: ralph
    cron: "0 * * * *"
    persona: ralph
    rate_limit_key: ralph_runs_per_day
  - name: bug_hunt
    cron: "0 6 * * *"
    persona: bug_hunter
    rate_limit_key: bug_hunter_runs_per_day
  - name: ux_audit
    cron: "0 12 * * *"
    persona: ux_auditor
    rate_limit_key: ux_auditor_runs_per_day
  - name: security_weekly
    cron: "0 9 * * 1"
    persona: security
    rate_limit_key: security_runs_per_day
