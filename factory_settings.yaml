caps:
  # Multi-app parallelism cap. 10 is generous — each agent runs in its
  # own git worktree under ``state/worktrees/`` so there's no shared
  # working-tree contention. Higher caps work fine if hardware + hourly
  # spend allow.
  global_concurrent_agents: 10
  # Per-repo cap — now decoupled from working-tree contention thanks to
  # ``factory.chain.worktree``. Each in-flight story gets its own
  # private worktree on disk so multiple stories can run in parallel
  # against a single app without racing on ``ensure_feature_branch``.
  # Set to 10 so non-active in-flight states (deploy_pending, dev_retry
  # waiting on next tick, etc.) don't accidentally throttle dispatch.
  per_repo_concurrent_agents: 10
  daily_spend_usd: 300
  # Operator-approved 2026-05-30: raised 15 -> 40 to let the ~29 re-dispatched
  # stories reprocess in parallel without constant hourly-cap throttling.
  # Daily $200 cap (chain stops at $180) remains the real spend ceiling.
  hourly_spend_usd: 40
queues:
  human_review_max_open_prs: 5
  failing_ci_pause_threshold: 3
rate_limits:
  pm_invocations_per_hour: 4
  ralph_runs_per_day: 24
  bug_hunter_runs_per_day: 6
  security_runs_per_day: 2
  ux_auditor_runs_per_day: 4
  # Factory self-improver. Now event-triggered — ``factory tick``
  # fires the improver whenever a fresh ``factory_needs_redesign``
  # event arrives (debounced ~10 min, capped daily). 12/day is the
  # circuit-breaker: enough headroom for normal event bursts while
  # still bounding LLM spend if the persona starts misfiring.
  factory_improver_runs_per_day: 12
modes:
  default: normal
  available: [normal, fix-only, drain-reviews, paused, exploratory, deploy-frozen, ux-audit-only]
direction_defaults:
  require_user_flow_for_ui: true
  require_api_spec_for_backend: true
  allow_explore_tag: true
  max_dev_retries: 3
  escalate_model_on_retry: true
  require_context_update_per_pr: true
  enforce_canonical_doc_paths: true
# End-of-tick auto-merge worker. When ``enabled`` is true,
# ``factory tick`` calls ``auto_merge_tick`` after every story handler
# runs and merges PRs whose chain gates have passed. ``wait_for_ci``
# uses ``gh pr merge --auto`` so GitHub holds the merge until required
# checks pass; for repos without required checks the merge happens
# immediately.
auto_merge:
  enabled: true
  trigger: end_of_tick
  merge_method: squash
  delete_branch_after_merge: true
  wait_for_ci: true
# Auto PM-sync. When enabled, ``factory tick`` triages any direction still
# in ``status: created`` / ``needs-direction`` into stories (same pipeline
# as ``factory pm-sync``), so directions filed by scheduled personas or
# ``factory tell`` never rot waiting for an operator. Bounded by
# ``rate_limits.pm_invocations_per_hour`` counted from real pm rows in the
# runs table.
auto_pm_sync:
  enabled: true
# Post-merge main-branch CI-health monitor (D004). When enabled, ``factory
# tick`` polls each app's main branch once per tick for a REQUIRED status
# check gone red AFTER merge and auto-files a ``ci-health`` direction so it
# gets fixed through the normal chain. This is the POST-merge safety net;
# the pre-merge required-check gate (branch protection) is unchanged and
# remains the primary defense. Advisory (non-required) reds never file a
# direction regardless of this flag.
ci_health:
  enabled: true
# Phase 6 scheduled personas. ``factory tick`` consults this on every run
# and dispatches due entries via ``factory.chain.scheduled_tasks``. Rate
# limits referenced by ``rate_limit_key`` look up the same-named field in
# ``rate_limits:`` above.
schedules:
  - name: ralph
    cron: "0 * * * *"
    persona: ralph
    rate_limit_key: ralph_runs_per_day
  - name: bug_hunt
    cron: "0 */4 * * *"
    persona: bug_hunter
    rate_limit_key: bug_hunter_runs_per_day
  - name: ux_audit
    cron: "0 */6 * * *"
    persona: ux_auditor
    rate_limit_key: ux_auditor_runs_per_day
  - name: security_weekly
    cron: "0 9 * * *"
    persona: security
    rate_limit_key: security_runs_per_day
  # Factory self-improver is NOT a cron-scheduled persona anymore —
  # ``factory tick`` calls ``should_fire_improver`` on every pass and
  # dispatches ``run_factory_improver`` whenever a new
  # ``factory_needs_redesign`` event has landed since the last run
  # (debounced ~10 min, capped at ``factory_improver_runs_per_day``).
  # Output is still persisted to ``state/improvements/<ts>.json`` and
  # surfaced on the pinned ``factory-improvements`` GH issue; the L2
  # apply pass opens PRs on ``xvanov/software-factory`` per proposal.

# In-tick run-until-green dev convergence (see DevConvergenceConfig).
# ENABLED 2026-07-17 after the benchmark campaign exercised the loop across
# 7 isolated-root stories (t1: two in-tick retries -> approved) with clean
# budget-guard behavior. Safety: heartbeat reaping is PID-liveness only
# (no wall-clock reaper), so a 45-min converging handler cannot be reaped.
# The loop compresses the 5-minute tick gaps between dev retries into one
# handler invocation — it does NOT grant extra attempts (_MAX_DEV_RETRIES
# stays authoritative) and stops early on: inner-attempt cap, <1 retry of
# headroom under the chain cap, per-story wall-clock/budget, or the global
# hourly/daily caps.
dev_convergence:
  enabled: true
  max_inner_attempts: 3
  per_story_wall_clock_s: 2700
  per_story_budget_usd: 8.0
  dev_sandbox_timeout_s: 1800
