# Per-persona LiteLLM model routing.
# Edit freely — the model_router reads this at runtime. Self-improvement seam.
#
# Schema:
#   default_provider: <azure|direct>          # which top-level routes block to read
#   routes.<persona>: <model_id>              # direct-provider routes (DeepSeek/Anthropic/OpenAI)
#   routes.<persona>.<difficulty>: <id>       # difficulty-aware persona (dev today)
#   azure_routes.<persona>: <model_id>        # Azure routes — either Foundry
#                                             #   (azure_ai/<deployment>) or Azure-OpenAI
#                                             #   (azure/<deployment>).
#   azure_routes.<persona>.<difficulty>: <id> # difficulty-aware Azure persona
#   defaults.fallback: <model_id>             # used when persona missing from active routes
#   defaults.azure_fallback: <model_id>       # used when persona missing under azure_routes
#
# Provider selection precedence at runtime:
#   1. FACTORY_PROVIDER env var ("azure" or "direct") overrides everything.
#   2. default_provider (this file).
#   3. "direct" if neither is set.

default_provider: azure

routes:
  pm: deepseek/deepseek-chat
  analyst: deepseek/deepseek-chat
  architect: anthropic/claude-opus-4-7
  # SM emits a structured JSON plan; deepseek-chat intermittently returns a
  # tiny malformed body falsely flagged finish_reason=length (operator-approved
  # 2026-05-29). Use gpt-5.4 (JSON-reliable) here too so SM is consistent
  # regardless of active provider; the azure_routes block already uses it.
  sm: azure/gpt-5.4
  dev:
    standard: deepseek/deepseek-coder
    hard: anthropic/claude-sonnet-4-6
  test_designer: anthropic/claude-opus-4-7
  test_implementer: deepseek/deepseek-coder
  reviewer: anthropic/claude-opus-4-7
  tech_writer: deepseek/deepseek-chat
  release_manager: deepseek/deepseek-chat
  onboarder: anthropic/claude-opus-4-7
  ux_designer: anthropic/claude-opus-4-7
  ux_auditor: anthropic/claude-opus-4-7
  ralph: deepseek/deepseek-chat
  bug_hunter: deepseek/deepseek-chat
  security: anthropic/claude-opus-4-7
  factory_improver: deepseek/deepseek-chat
  # L1 Watcher: cheap, runs every minute, summarises signals + escalates.
  # Routed to deepseek-chat (same tier as factory_improver) — structured
  # JSON output, no code-generation, low latency requirement.
  manager_watcher: deepseek/deepseek-chat
  # L2 Summarizer: mid-tier, runs every 3 minutes (or immediately on L1
  # escalation). Consumes flagged L1 notes + underlying signals and
  # emits structured concern documents. Sonnet-class for deeper analysis.
  manager_summarizer: anthropic/claude-sonnet-4-6
  # L3 Diagnostician: frontier-tier, runs only on L2 escalation.
  # Reads a single concern + pre-loaded factory source and emits a
  # concrete proposal with a unified-diff patch.  Opus-class reasoning
  # for root-cause analysis and coherent patch generation.
  manager_diagnostician: anthropic/claude-opus-4-7

# Azure OpenAI / Cognitive Services deployments at mv-coding-agent-foundry.
# Three deployments live there:
#   - gpt-5.4           (general-purpose, structured output, 500K TPM)
#   - gpt-5.3-codex     (code specialist, RESPONSES-API-ONLY — see note below)
#   - deepseek-v4-pro   (heavy implementation, 500K TPM)
#
# ``gpt-5.3-codex`` is currently UNROUTED. The codex deployment rejects Chat
# Completions with 400 "operation unsupported" and is reachable only via the
# Responses API. ``.env`` now sets ``AZURE_API_VERSION=2025-03-01-preview``
# (which supports BOTH Chat Completions AND Responses API), so the OpenHands
# SDK's auto-route-to-Responses for gpt-5.x family works. Routing the codex
# model through ``text_run`` still requires a dedicated Responses-API code
# path (text_run currently uses litellm.completion); that's a future direction.
# For now, all code-judgment personas use gpt-5.4 (still satisfies reviewer ≠
# dev because dev / test_implementer run on deepseek-v4-pro).
azure_routes:
  # Structured-text personas → gpt-5.4 (general purpose, JSON-friendly)
  pm: azure/gpt-5.4
  analyst: azure/gpt-5.4
  sm: azure/gpt-5.4
  tech_writer: azure/gpt-5.4
  onboarder: azure/gpt-5.4
  architect: azure/gpt-5.4
  ux_designer: azure/gpt-5.4
  ux_auditor: azure/gpt-5.4
  ralph: azure/gpt-5.4
  bug_hunter: azure/gpt-5.4
  release_manager: azure/gpt-5.4
  # Factory self-improvement scout — cheap general-purpose model fits
  # the persona's pattern (structured JSON proposals, no code-judgment
  # heavy lifting). Direct routing per user spec.
  factory_improver: azure/gpt-5.4
  # L1 Watcher: same cheap-tier as factory_improver under Azure provider.
  manager_watcher: azure/gpt-5.4
  # L2 Summarizer: mid-tier under Azure. Same gpt-5.4 tier as architect/reviewer
  # for structured analysis with deeper reasoning than L1.
  manager_summarizer: azure/gpt-5.4
  # L3 Diagnostician: frontier-tier under Azure.  Same gpt-5.4 tier as
  # architect/reviewer (the highest cost-tier deployed at this foundry).
  # Frontier reasoning for root-cause diagnosis and patch generation.
  manager_diagnostician: azure/gpt-5.4

  # Code-judgment work → intent is gpt-5.3-codex; falls back to gpt-5.4 today
  # (codex is Responses-API-only — see header note). reviewer ≠ dev still
  # holds because dev/test_implementer run on deepseek-v4-pro.
  reviewer: azure/gpt-5.4
  test_designer: azure/gpt-5.4
  security: azure/gpt-5.4

  # Heavy implementation → deepseek-v4-pro
  test_implementer: azure/deepseek-v4-pro
  dev:
    standard: azure/deepseek-v4-pro
    # Hard tier deliberately a DIFFERENT model family: tier escalation is the
    # escape hatch for per-model failure modes (Azure content-filter blocks on
    # deepseek completions, observed 2026-06-11). Same-model "escalation" was
    # a no-op.
    hard: azure/gpt-5.4

defaults:
  fallback: deepseek/deepseek-chat
  azure_fallback: azure/gpt-5.4

# Per-model output-token caps. Looked up by the LiteLLM model id ``route()``
# returns. The cap is the ``max_tokens`` (== max completion / output) value
# the provider will honor in one call — distinct from the context window
# (which governs input size, typically 100k–1M for current models).
#
# Picking values: pin to the model's stated output max; the provider bills
# only what's used, not the cap, so generous caps cost nothing on outputs
# that fit comfortably. Too low → truncation mid-JSON → JSONDecodeError.
#
# Fallback is ``defaults.max_output_tokens_default`` when a model is unlisted.
model_limits:
  # Anthropic — Claude 4.x family supports 32k output across Opus/Sonnet/Haiku.
  anthropic/claude-opus-4-7: { max_output_tokens: 32768 }
  anthropic/claude-sonnet-4-6: { max_output_tokens: 32768 }
  anthropic/claude-haiku-4-5-20251001: { max_output_tokens: 16384 }

  # DeepSeek — chat/coder native cap is 8k output (May 2026).
  deepseek/deepseek-chat: { max_output_tokens: 8192 }
  deepseek/deepseek-coder: { max_output_tokens: 8192 }

  # Azure deployments
  # gpt-5.4 supports 16k output reliably (RFC 2026-02 lifted from 8k).
  azure/gpt-5.4: { max_output_tokens: 16384 }
  # azure/deepseek-v4-pro — same 8k native ceiling as direct DeepSeek.
  azure/deepseek-v4-pro: { max_output_tokens: 8192 }
  # gpt-5.3-codex (Responses-API-only — currently unrouted, see header).
  azure/gpt-5.3-codex: { max_output_tokens: 16384 }

# Conservative default if a model isn't in the table above.
# Set under ``defaults`` so existing readers keep working.
defaults_extra:
  max_output_tokens_default: 8192
