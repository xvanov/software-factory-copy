# Per-persona LiteLLM model routing.
# Edit freely — the model_router reads this at runtime. Self-improvement seam.
#
# Schema:
#   default_provider: <azure|direct>          # which top-level routes block to read
#   routes.<persona>: <model_id>              # direct-provider routes (DeepSeek/Anthropic/OpenAI)
#   routes.<persona>.<difficulty>: <id>       # difficulty-aware persona (dev today)
#   azure_routes.<persona>: <model_id>        # Azure routes — either Foundry
#                                             #   (azure_ai/<deployment>) or Azure-OpenAI
#                                             #   (azure/<deployment>).
#   azure_routes.<persona>.<difficulty>: <id> # difficulty-aware Azure persona
#   defaults.fallback: <model_id>             # used when persona missing from active routes
#   defaults.azure_fallback: <model_id>       # used when persona missing under azure_routes
#
# Provider selection precedence at runtime:
#   1. FACTORY_PROVIDER env var ("azure" or "direct") overrides everything.
#   2. default_provider (this file).
#   3. "direct" if neither is set.

default_provider: azure

routes:
  pm: deepseek/deepseek-chat
  analyst: deepseek/deepseek-chat
  architect: anthropic/claude-opus-4-7
  sm: deepseek/deepseek-chat
  dev:
    standard: deepseek/deepseek-coder
    hard: anthropic/claude-sonnet-4-6
  test_designer: anthropic/claude-opus-4-7
  test_implementer: deepseek/deepseek-coder
  reviewer: anthropic/claude-opus-4-7
  tech_writer: deepseek/deepseek-chat
  release_manager: deepseek/deepseek-chat
  onboarder: anthropic/claude-opus-4-7
  ux_designer: anthropic/claude-opus-4-7
  ux_auditor: anthropic/claude-opus-4-7
  ralph: deepseek/deepseek-chat
  bug_hunter: deepseek/deepseek-chat
  security: anthropic/claude-opus-4-7

# Azure OpenAI / Cognitive Services deployments at mv-coding-agent-foundry.
# Three deployments live there:
#   - gpt-5.4           (general-purpose, structured output, 500K TPM)
#   - gpt-5.3-codex     (code specialist, RESPONSES-API-ONLY — see note below)
#   - deepseek-v4-pro   (heavy implementation, 500K TPM)
#
# ``gpt-5.3-codex`` is currently UNROUTED. The codex deployment rejects Chat
# Completions with 400 "operation unsupported" and is reachable only via the
# Responses API. ``.env`` now sets ``AZURE_API_VERSION=2025-03-01-preview``
# (which supports BOTH Chat Completions AND Responses API), so the OpenHands
# SDK's auto-route-to-Responses for gpt-5.x family works. Routing the codex
# model through ``text_run`` still requires a dedicated Responses-API code
# path (text_run currently uses litellm.completion); that's a future direction.
# For now, all code-judgment personas use gpt-5.4 (still satisfies reviewer ≠
# dev because dev / test_implementer run on deepseek-v4-pro).
azure_routes:
  # Structured-text personas → gpt-5.4 (general purpose, JSON-friendly)
  pm: azure/gpt-5.4
  analyst: azure/gpt-5.4
  sm: azure/gpt-5.4
  tech_writer: azure/gpt-5.4
  onboarder: azure/gpt-5.4
  architect: azure/gpt-5.4
  ux_designer: azure/gpt-5.4
  ux_auditor: azure/gpt-5.4
  ralph: azure/gpt-5.4
  bug_hunter: azure/gpt-5.4
  release_manager: azure/gpt-5.4

  # Code-judgment work → intent is gpt-5.3-codex; falls back to gpt-5.4 today
  # (codex is Responses-API-only — see header note). reviewer ≠ dev still
  # holds because dev/test_implementer run on deepseek-v4-pro.
  reviewer: azure/gpt-5.4
  test_designer: azure/gpt-5.4
  security: azure/gpt-5.4

  # Heavy implementation → deepseek-v4-pro
  test_implementer: azure/deepseek-v4-pro
  dev:
    standard: azure/deepseek-v4-pro
    hard: azure/deepseek-v4-pro

defaults:
  fallback: deepseek/deepseek-chat
  azure_fallback: azure/gpt-5.4
