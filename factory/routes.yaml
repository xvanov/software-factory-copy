# Per-persona LiteLLM model routing.
# Edit freely — the model_router reads this at runtime. Self-improvement seam.
#
# Schema:
#   default_provider: <azure|direct>          # which top-level routes block to read
#   routes.<persona>: <model_id>              # direct-provider routes
#   routes.<persona>.<difficulty>: <id>       # difficulty-aware persona (dev today)
#   azure_routes.<persona>: <model_id>        # Azure-default routes block
#   azure_routes.<persona>.<difficulty>: <id> # difficulty-aware Azure persona
#   defaults.fallback: <model_id>             # used when persona missing from active routes
#   defaults.azure_fallback: <model_id>       # used when persona missing under azure_routes
#
# NOTE: the two blocks are named after their *default* provider, but any entry
# may point at any provider — API-key resolution is per-model-id prefix
# (see ``factory/runner.py::_provider_env_key``):
#   azure/…       → AZURE_API_KEY        (Azure OpenAI, base_url from AZURE_ENDPOINT)
#   openrouter/…  → OPENROUTER_API_KEY   (OpenRouter, LiteLLM-native endpoint)
#   deepseek/…    → DEEPSEEK_API_KEY     (DeepSeek direct)
#
# Anthropic/Claude models are deliberately ABSENT: hard operator constraint
# (2026-07-15) — the factory must be independent of Anthropic models/limits;
# Claude Code is used only as an external benchmark baseline.
#
# Provider selection precedence at runtime:
#   1. FACTORY_PROVIDER env var ("azure" or "direct") overrides everything.
#   2. default_provider (this file).
#   3. "direct" if neither is set.

default_provider: azure

routes:
  pm: deepseek/deepseek-chat
  analyst: deepseek/deepseek-chat
  architect: openrouter/z-ai/glm-5.2
  # SM emits a structured JSON plan; deepseek-chat intermittently returns a
  # tiny malformed body falsely flagged finish_reason=length (operator-approved
  # 2026-05-29). Use gpt-5.4 (JSON-reliable) here too so SM is consistent
  # regardless of active provider; the azure_routes block already uses it.
  sm: azure/gpt-5.4
  dev:
    standard: deepseek/deepseek-coder
    # Hard tier: different family + genuinely stronger code-specialist tier.
    hard: openrouter/moonshotai/kimi-k2.7-code
  test_implementer: deepseek/deepseek-coder
  reviewer: openrouter/z-ai/glm-5.2
  tech_writer: deepseek/deepseek-chat
  release_manager: deepseek/deepseek-chat
  onboarder: openrouter/z-ai/glm-5.2
  ux_designer: openrouter/z-ai/glm-5.2
  ux_auditor: openrouter/z-ai/glm-5.2
  ralph: deepseek/deepseek-chat
  bug_hunter: deepseek/deepseek-chat
  security: openrouter/z-ai/glm-5.2
  factory_improver: deepseek/deepseek-chat
  # FMS ladder (direct block): cheap → mid → frontier-open.
  # L1 Watcher: fires every 60s; structured JSON triage only.
  manager_watcher: openrouter/deepseek/deepseek-v4-flash
  # L2 Summarizer: runs every ~3 min or on L1 escalation; mid-tier analysis.
  manager_summarizer: openrouter/z-ai/glm-4.7
  # L3 Diagnostician: rare, escalation-only; frontier-open reasoning for
  # root-cause analysis + unified-diff proposal generation.
  manager_diagnostician: openrouter/z-ai/glm-5.2

# Azure OpenAI / Cognitive Services deployments at mv-coding-agent-foundry:
#   - gpt-5.4           (general-purpose, structured output, 500K TPM)
#   - deepseek-v4-pro   (heavy implementation, 500K TPM)
#   - gpt-5.3-codex     (UNROUTED: Responses-API-only; superseded — code-judgment
#                        personas now route to openrouter/z-ai/glm-5.2 instead.)
azure_routes:
  # Structured-text personas → gpt-5.4 (general purpose, JSON-friendly)
  pm: azure/gpt-5.4
  analyst: azure/gpt-5.4
  sm: azure/gpt-5.4
  tech_writer: azure/gpt-5.4
  onboarder: azure/gpt-5.4
  architect: azure/gpt-5.4
  ux_designer: azure/gpt-5.4
  ux_auditor: azure/gpt-5.4
  ralph: azure/gpt-5.4
  bug_hunter: azure/gpt-5.4
  release_manager: azure/gpt-5.4
  factory_improver: azure/gpt-5.4

  # FMS ladder (live block): cheap → mid → frontier-open. This is a REAL cost
  # ladder again (it had collapsed to gpt-5.4 across all three tiers).
  # L1 Watcher: ~88% of all persona runs by count — cheapest credible JSON
  # triage tier. Watch for malformed-JSON regressions (deepseek precedent,
  # see sm comment above); fallback is azure/gpt-5.4.
  manager_watcher: openrouter/deepseek/deepseek-v4-flash
  # L2 Summarizer: mid-tier structured analysis.
  manager_summarizer: azure/gpt-5.4
  # L3 Diagnostician: escalation-only root-cause + patch proposals →
  # frontier-open tier (GLM-5.2: top open model on long-horizon benchmarks).
  manager_diagnostician: openrouter/z-ai/glm-5.2

  # Code-judgment work → GLM-5.2 (replaces the unreachable gpt-5.3-codex
  # intent). reviewer ≠ dev still holds: dev/test_implementer run on
  # deepseek-v4-pro, reviewer/security judge on a different family.
  reviewer: openrouter/z-ai/glm-5.2
  security: openrouter/z-ai/glm-5.2

  # Heavy implementation → deepseek-v4-pro
  test_implementer: azure/deepseek-v4-pro
  dev:
    standard: azure/deepseek-v4-pro
    # Hard tier deliberately a DIFFERENT model family: tier escalation is the
    # escape hatch for per-model failure modes (Azure content-filter blocks on
    # deepseek completions, observed 2026-06-11) — and now also a genuine
    # capability jump (Kimi K2.7-code: code-specialist frontier-open tier).
    hard: openrouter/moonshotai/kimi-k2.7-code

defaults:
  fallback: deepseek/deepseek-chat
  azure_fallback: azure/gpt-5.4

# Per-model output-token caps. Looked up by the LiteLLM model id ``route()``
# returns. The cap is the ``max_tokens`` (== max completion / output) value
# the provider will honor in one call — distinct from the context window
# (which governs input size, typically 100k–1M for current models).
#
# Picking values: pin to the model's stated output max; the provider bills
# only what's used, not the cap, so generous caps cost nothing on outputs
# that fit comfortably. Too low → truncation mid-JSON → JSONDecodeError.
#
# Fallback is ``defaults.max_output_tokens_default`` when a model is unlisted.
model_limits:
  # DeepSeek — chat/coder native cap is 8k output (May 2026).
  deepseek/deepseek-chat: { max_output_tokens: 8192 }
  deepseek/deepseek-coder: { max_output_tokens: 8192 }

  # Azure deployments
  # gpt-5.4 supports 16k output reliably (RFC 2026-02 lifted from 8k).
  azure/gpt-5.4: { max_output_tokens: 16384 }
  # azure/deepseek-v4-pro — same 8k native ceiling as direct DeepSeek.
  azure/deepseek-v4-pro: { max_output_tokens: 8192 }
  # gpt-5.3-codex (Responses-API-only — unrouted, kept for reference).
  azure/gpt-5.3-codex: { max_output_tokens: 16384 }

  # OpenRouter (caps verified against the live catalog 2026-07-15;
  # v4-flash publishes no max_completion_tokens — conservative 8k).
  openrouter/deepseek/deepseek-v4-flash: { max_output_tokens: 8192 }
  openrouter/z-ai/glm-5.2: { max_output_tokens: 32768 }
  openrouter/z-ai/glm-4.7: { max_output_tokens: 32768 }
  openrouter/moonshotai/kimi-k2.7-code: { max_output_tokens: 32768 }

# Conservative default if a model isn't in the table above.
# Set under ``defaults`` so existing readers keep working.
defaults_extra:
  max_output_tokens_default: 8192
