# Per-persona LiteLLM model routing.
# Edit freely — the model_router reads this at runtime. Self-improvement seam.
#
# Schema:
#   default_provider: <azure|direct>          # which top-level routes block to read
#   routes.<persona>: <model_id>              # direct-provider routes
#   routes.<persona>.<difficulty>: <id>       # difficulty-aware persona (dev today)
#   azure_routes.<persona>: <model_id>        # Azure-default routes block
#   azure_routes.<persona>.<difficulty>: <id> # difficulty-aware Azure persona
#   defaults.fallback: <model_id>             # used when persona missing from active routes
#   defaults.azure_fallback: <model_id>       # used when persona missing under azure_routes
#
# API-key resolution is per-model-id prefix (factory/runner.py::_provider_env_key):
#   azure/…       → AZURE_API_KEY        (Azure OpenAI, base_url from AZURE_ENDPOINT)
#   deepseek/…    → DEEPSEEK_API_KEY     (DeepSeek direct)
#   openrouter/…  → OPENROUTER_API_KEY   (supported by the plumbing; no routes today —
#                                         operator decision 2026-07-16: Azure-only)
# The router degrades any route whose provider key is missing to the block
# fallback (warn-once) — see model_router.route().
#
# Anthropic/Claude models are deliberately ABSENT: hard operator constraint
# (2026-07-15) — the factory must be independent of Anthropic models/limits;
# Claude Code is used only as an external benchmark baseline.
#
# Provider selection precedence at runtime:
#   1. FACTORY_PROVIDER env var ("azure" or "direct") overrides everything.
#   2. default_provider (this file).
#   3. "direct" if neither is set.

default_provider: azure

routes:
  pm: deepseek/deepseek-chat
  analyst: deepseek/deepseek-chat
  architect: azure/gpt-5.4
  # SM emits a structured JSON plan; deepseek-chat intermittently returns a
  # tiny malformed body falsely flagged finish_reason=length (operator-approved
  # 2026-05-29). Use gpt-5.4 (JSON-reliable) here too so SM is consistent
  # regardless of active provider; the azure_routes block already uses it.
  sm: azure/gpt-5.4
  dev:
    standard: deepseek/deepseek-coder
    # Hard tier: different family + code-specialist tier (see azure_routes).
    hard: azure/gpt-5.3-codex
  test_implementer: deepseek/deepseek-coder
  reviewer: azure/gpt-5.3-codex
  # WS1.2 independent acceptance oracle. Deliberately a DIFFERENT model family
  # than dev (deepseek) so the test author and the implementer never share a
  # model — reinforces independence. gpt-5.4 is JSON-reliable (schema mode).
  acceptance_author: azure/gpt-5.4
  tech_writer: deepseek/deepseek-chat
  release_manager: deepseek/deepseek-chat
  onboarder: azure/gpt-5.4
  ux_designer: azure/gpt-5.4
  ux_auditor: azure/gpt-5.4
  ralph: deepseek/deepseek-chat
  bug_hunter: deepseek/deepseek-chat
  security: azure/gpt-5.3-codex
  factory_improver: deepseek/deepseek-chat
  # FMS ladder (direct block mirrors the azure ladder — azure/ ids resolve by
  # prefix regardless of the active block).
  manager_watcher: azure/deepseek-v4-pro
  manager_summarizer: azure/gpt-5.4
  manager_diagnostician: azure/gpt-5.3-codex

# Azure OpenAI / Cognitive Services deployments at mv-coding-agent-foundry
# (deployment list verified live 2026-07-16 — exactly these three exist):
#   - gpt-5.4           (general-purpose, structured output, 500K TPM)
#   - gpt-5.3-codex     (code specialist — REACHABLE since AZURE_API_VERSION=
#                        2025-03-01-preview: verified live 2026-07-16 that
#                        litellm.completion bridges it, so BOTH text_run and
#                        sandbox_run can route to it; the old "Responses-API-
#                        only, unroutable" note is obsolete)
#   - deepseek-v4-pro   (heavy implementation; ~4x cheaper per blended token
#                        than gpt-5.4 in our own runs ledger: $0.51 vs $1.97
#                        per Mtok, measured 2026-07-16)
#
# Cost note: the L1 watcher fires every 60s and produced ~88% of all run rows
# (~$1,000 of $1,556 total at gpt-5.4 rates) — it sits on deepseek-v4-pro for
# the ~4x cut. If a genuinely cheap deployment (gpt-5.4-mini / DeepSeek V4
# Flash class) is ever added to the Foundry resource, point manager_watcher
# at it and the saving compounds.
azure_routes:
  # Structured-text personas → gpt-5.4 (general purpose, JSON-friendly)
  pm: azure/gpt-5.4
  analyst: azure/gpt-5.4
  sm: azure/gpt-5.4
  tech_writer: azure/gpt-5.4
  onboarder: azure/gpt-5.4
  architect: azure/gpt-5.4
  # WS1.2 independent acceptance oracle — see the direct block for rationale.
  acceptance_author: azure/gpt-5.4
  ux_designer: azure/gpt-5.4
  ux_auditor: azure/gpt-5.4
  ralph: azure/gpt-5.4
  bug_hunter: azure/gpt-5.4
  release_manager: azure/gpt-5.4
  factory_improver: azure/gpt-5.4

  # FMS ladder: cheap → mid → code-specialist. A REAL cost ladder again (it
  # had collapsed to gpt-5.4 across all three tiers).
  # L1 Watcher: 60s cadence, structured JSON triage — the cheapest deployed
  # model. JSON mode verified live on this deployment (2026-07-16); if the
  # deepseek malformed-JSON behavior (see sm comment) ever reappears here,
  # revert this one line to azure/gpt-5.4.
  manager_watcher: azure/deepseek-v4-pro
  # L2 Summarizer: mid-tier structured analysis.
  manager_summarizer: azure/gpt-5.4
  # L3 Diagnostician: escalation-only root-cause + unified-diff proposals —
  # the code specialist.
  manager_diagnostician: azure/gpt-5.3-codex

  # Code-judgment work → gpt-5.3-codex, the ORIGINAL intent, now reachable.
  # reviewer ≠ dev holds: dev/test_implementer run on deepseek-v4-pro.
  reviewer: azure/gpt-5.3-codex
  security: azure/gpt-5.3-codex

  # Heavy implementation → deepseek-v4-pro
  test_implementer: azure/deepseek-v4-pro
  dev:
    standard: azure/deepseek-v4-pro
    # Hard tier deliberately a DIFFERENT model family: tier escalation is the
    # escape hatch for per-model failure modes (Azure content-filter blocks on
    # deepseek completions, observed 2026-06-11) — and a genuine capability
    # jump (code-specialist reasoning tier).
    hard: azure/gpt-5.3-codex

defaults:
  fallback: deepseek/deepseek-chat
  azure_fallback: azure/gpt-5.4

# Per-persona LLM constructor overrides for sandbox runs (OpenHands SDK
# ``LLM(...)``), resolved by ``model_router.llm_params_for``. Allowlisted
# keys: reasoning_effort, caching_prompt, max_output_tokens, temperature,
# litellm_extra_body — anything else is dropped (config typos must not crash
# LLM construction). ``max_output_tokens`` is injected automatically from
# ``model_limits`` below; entries here override it. NOTE: ``reasoning_effort``
# "none" must be QUOTED — bare ``none`` is YAML null and gets dropped.
llm_params:
  defaults:
    caching_prompt: true # explicit — pins the SDK default
  personas:
    dev:
      standard: { reasoning_effort: "none" } # deepseek-v4-pro: no reasoning surface
      hard: { reasoning_effort: high } # gpt-5.3-codex: reasoning tier
    test_implementer: { reasoning_effort: "none" }
    reviewer: { reasoning_effort: high } # applies only to repo-mode sandbox reviews

# Agent-preset overrides for sandbox personas, resolved by
# ``model_router.preset_for``. Known values: ``planning`` (OpenHands
# plan-first agent with PLAN.md artifacts). Absent/unknown → default agent.
# Experiment surface — keep empty until A/B'd on real stories.
presets: {}

# Per-model output-token caps. Looked up by the LiteLLM model id ``route()``
# returns. The cap is the ``max_tokens`` (== max completion / output) value
# the provider will honor in one call — distinct from the context window
# (which governs input size, typically 100k–1M for current models).
#
# Picking values: pin to the model's stated output max; the provider bills
# only what's used, not the cap, so generous caps cost nothing on outputs
# that fit comfortably. Too low → truncation mid-JSON → JSONDecodeError.
#
# Fallback is ``defaults.max_output_tokens_default`` when a model is unlisted.
model_limits:
  # DeepSeek — chat/coder native cap is 8k output (May 2026).
  deepseek/deepseek-chat: { max_output_tokens: 8192 }
  deepseek/deepseek-coder: { max_output_tokens: 8192 }

  # Azure deployments
  # gpt-5.4 supports 16k output reliably (RFC 2026-02 lifted from 8k).
  azure/gpt-5.4: { max_output_tokens: 16384 }
  # azure/deepseek-v4-pro — same 8k native ceiling as direct DeepSeek.
  azure/deepseek-v4-pro: { max_output_tokens: 8192 }
  # gpt-5.3-codex — same 16k class as gpt-5.4.
  azure/gpt-5.3-codex: { max_output_tokens: 16384 }

# Conservative default if a model isn't in the table above.
# Set under ``defaults`` so existing readers keep working.
defaults_extra:
  max_output_tokens_default: 8192
