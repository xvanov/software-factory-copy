name: sacrifice
repo: xvanov/sacrifice
default_branch: main
context_dir: context
# Path to the app source tree (sibling of the factory root by default).
# Phase 7: resolve_app_repo_path(...) uses this to thread the real repo
# into every compose_context_prelude call. ``../sacrifice`` resolves to
# ``~/sacrifice/`` when the factory is at ``~/software-factory/``.
app_repo_path: "../sacrifice"
# Phase 5 deploy block. Sacrifice is locally-hosted via Docker Compose,
# so every command targets ``localhost``. ``enabled: false`` until the
# Dockerfiles + docker-compose.prod.yml + ``/healthz`` endpoint exist
# (those land as their own directions through the standard TDD chain).
# Aspirational defaults — the factory reads these strings verbatim and
# stays stack-agnostic.
deploy:
  enabled: false
  working_directory: "."
  pre_deploy_commands:
    - "docker compose -f docker-compose.prod.yml build"
  deploy_command: "docker compose -f docker-compose.prod.yml up -d"
  health_check_command: "curl -fsS http://localhost:8000/healthz"
  health_check_max_attempts: 10
  health_check_interval_seconds: 3
  smoke_test_command: "npx playwright test --grep @smoke --reporter=line"
  rollback_command: "docker compose -f docker-compose.prod.yml.previous up -d"
  post_deploy_record:
    container_state: "docker compose ps --format json"
  timeout_seconds: 600
  env_var_passthrough:
    - STRIPE_API_KEY
    - DATABASE_URL
# Phase 4 gate commands. Aspirational defaults — Sacrifice's actual lint
# stack lands in a future direction. The factory reads these strings
# verbatim; the chain stays stack-agnostic.
gates:
  lint_command: "ruff check . && cd frontend && npm run lint"
  format_check_command: "ruff format --check ."
  type_check_command: "mypy backend"
  # Run from backend/ — sacrifice's pyproject.toml + pytest config live
  # there, not at the repo root. Limit to ``tests/`` (the unit-test
  # tree); ``backend/e2e_test.py`` requires a running stack (postgres,
  # backend, celery) and is the operator's smoke gate, not the dev-loop
  # gate. Use ``uv run --extra dev`` so each per-story worktree
  # self-syncs the backend's declared deps (asyncpg, pytest-asyncio,
  # etc.) into a local .venv before pytest collection — without this
  # the worktree falls back to the factory's ambient .venv which lacks
  # sacrifice-specific runtime deps and pytest exits with a
  # ModuleNotFoundError collection error (exit code 4), routing every
  # backend story to BLOCKED_TESTS_NEED_CLARIFICATION.
  test_command: "cd backend && uv run --extra dev pytest -q tests/"
  coverage_command: "pytest --cov=backend --cov-report=json --cov-fail-under=70"
  e2e_command: "npx playwright test"
  mutation_testing: false
models: {}  # use default routing
