  tracker_title: D085 strengthen secret governance and log redaction
  tracker_body: '## Summary

    D085 strengthens integration secret handling and log safety across Sacrifice.


    ## Why

    Leaked integration credentials can enable payment abuse and compromise external
    provider accounts.


    ## What the direction actually asks for

    - Remove or block unapproved secret-loading paths, especially defaults or hardcoded
    fallbacks.

    - Ensure application logs redact tokens/keys, with executable tests proving redaction.

    - Add documented credential rotation and scope policy for Stripe, OAuth, and provider
    integrations.


    ## WHY / product-risk framing

    - WHY now: the app integrates with Stripe, OAuth providers, YouTube, GitHub, Redis,
    Postgres, and Azure Foundry; weak secret governance multiplies blast radius.

    - WHY this decomposition: secret source enforcement, log redaction, and operator
    policy are separable deliverables that can land safely in sequence.

    - WHY not one big security story: config hardening + logging behavior + docs would
    exceed a single dev-sized pass and stall the chain.


    ## Notes from current state

    - Backend settings live in `backend/app/config.py`.

    - Existing integrations include Google OAuth, GitHub OAuth, YouTube, Stripe, Redis,
    PostgreSQL, and Azure Foundry.

    - Acceptance criteria are testable enough to spawn small slices because the direction
    is marked `explore: true` and includes explicit outcomes.


    ## Acceptance criteria from direction

    - Secrets are loaded from approved secure sources only, not defaults/hardcoded
    fallbacks.

    - Application logs redact tokens/keys and tests assert redaction behavior.

    - Documented rotation and scope policy exists for Stripe/OAuth/provider credentials.


    ## Proposed execution order

    1. Establish approved-secret-source guardrails in backend config.

    2. Add log redaction behavior and tests.

    3. Document rotation and least-scope policy for credentials.


    ## Risk / open questions to validate during implementation

    - Which current config fields still have insecure defaults or fallbacks in `backend/app/config.py`?

    - Which logger paths can emit headers, bearer tokens, API keys, or DSNs today?

    - Which canonical doc path should hold the operator-facing credential governance
    policy?'
  child_stories:
