    chain_kind: tdd
    rationale: 'Vertical slice for the first acceptance criterion. WHY first: until
      config loading rejects hardcoded/default secret fallbacks, the app can still
      boot insecurely. Keep this to backend settings and one focused test file so
      it lands as a small security hardening PR before any logging changes.'
    estimated_new_files: 1
