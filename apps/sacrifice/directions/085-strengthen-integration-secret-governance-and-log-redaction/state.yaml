    estimated_sandbox_iterations: 170
    points: 5
  - title: D085 add token and key redaction to application logging
    scope: backend
    chain_kind: tdd
    rationale: 'Vertical slice for runtime log safety. WHY separate: redaction logic
      and logger wiring are independently shippable and should not be bundled with
      config governance. This story should implement redaction at the logging boundary
      and preserve application behavior while preventing sensitive values from appearing
      in logs.'
    estimated_new_files: 1
    estimated_modified_files: 2
    estimated_sandbox_iterations: 180
    points: 5
  - title: D085 add tests asserting secret redaction behavior
    scope: test
