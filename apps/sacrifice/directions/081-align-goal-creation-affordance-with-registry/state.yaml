  tracker_title: D081 align goal creation affordance with registry
  tracker_body: '## Summary

    Align the goal creation UX with the backend''s registry-backed goal types so the
    app stops advertising a stale, hardcoded subset.


    ## Why

    The current product affordance lies to the user: the backend already exposes registry-backed
    goal-type metadata at `/api/goal-types`, but the creation UI still uses hardcoded
    local constants and fixed unions. WHY does this matter? Because users judge capability
    from what they can select. If the UI excludes valid registered types, we suppress
    available actions. If the client/backend schemas still reject those types, creation
    fails after the user has already committed effort.


    ## What the direction requires

    - The selectable goal types shown in the UI must match the registry-backed set
    accepted by the API.

    - Creating a registered goal type must not fail because the client or backend
    still carries stale fixed unions.


    ## Current-state evidence

    - Backend already exposes `/api/goal-types` metadata.

    - Frontend `GoalCreateScreen` still builds options from hardcoded constants.

    - Goal creation remains fixed to four built-in types in frontend unions, backend
    schema validation, and DB enums.


    ## PM WHY / scope cut

    WHY split this into slices? Because there are two distinct failure modes:

    1. Discovery/affordance mismatch in the UI.

    2. Submission/validation mismatch from stale unions and schema constraints.


    A single broad "update frontend and backend" story would be too horizontal and
    risks stalling. The smallest valuable path is: first consume the registry in the
    creation surface, then remove stale create-time validation blockers so a registered
    type can actually be submitted.


    ## Acceptance criteria from direction

    - [ ] The set of selectable goal types in the UI matches the registry-backed set
    accepted by the API.

    - [ ] Attempting to create a registered goal type does not fail because of stale
    client or schema unions.

    '
