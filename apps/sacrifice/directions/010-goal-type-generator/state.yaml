  tracker_title: "D010 goal-type-generator chat\u2192factory pipeline"
  tracker_body: '## Summary

    D010 closes the loop after D007/D008/D009: when chat cannot match a goal type,
    Sacrifice should synthesize a factory direction from the user''s intent, write
    it into the mounted factory directions directory, poll direction state, notify
    on merge, and let the user accept or iterate. WHY does this matter? Because the
    product promise shifts from a fixed catalog to natural-language expansion of verification
    types.


    ## Backpressure check

    - `flow.md` present: yes

    - `api_spec.md` present: yes

    - acceptance criteria present in `direction.md`: yes

    - artifacts present for pushup validation: yes


    ## Product questions answered by the direction

    - WHY create a goal before the type exists? So the user can commit intent now
    and wait asynchronously.

    - WHY add `awaiting_goal_type`? So deadlines/payment enforcement do not incorrectly
    charge inactive generated goals.

    - WHY expose generation status and notifications? So the user can leave the app
    and still re-enter when the generated type is ready.

    - WHY support iteration? Because first-pass generated modules will often miss
    nuanced acceptance details.

    - WHY fake the factory chain in CI? To validate Sacrifice plumbing deterministically
    without invoking the real chain.


    ## Delivery notes

    This work is too large for one dev pass, so it is decomposed into small vertical
    slices. Sequence matters:

    1. land persistence/state primitives,

    2. land direction synthesis + file writing,

    3. land request/status/accept/iterate endpoints,

    4. land notifications and deadline guardrails,

    5. land deterministic fake-factory test harness and validation cases,

    6. land docs.


    ## Risks / watchpoints

    - LLM synthesis must be service-shaped and mockable; otherwise tests will be flaky.

    - Direction id allocation must not assume sequential numbering for iterations.

    - Status mapping from `state.yaml` to coarse API states must be explicit and stable.

    - Spend cap enforcement must happen before expensive synthesis calls.

    - The pushup fixture pipeline depends on D008 upload path only; no side upload
    shortcuts.

    - Iteration writes `parent_direction` forward-compatibly even though factory-side
    consumption is out of scope.


    ## Acceptance coverage map

    - Direction synthesis + mounted write path: covered by backend stories 3-4.

    - Goal lifecycle / DB / worker skip: covered by stories 1-2.

    - API endpoints: covered by stories 5-9.

    - Spend ledger / 429 cap: covered by story 10.

    - Notification on merge: covered by story 8.

    - Regen and pushup deterministic CI: covered by stories 11-14.

    - Context rewrite and architecture diagram: covered by docs stories 15-16.

    '
