  tracker_title: D082 harden auth token lifecycle and replay defenses
  tracker_body: '## Summary

    Harden bearer-token handling so compromised auth material is less useful for account
    impersonation and pledge abuse.


    ## WHY this matters

    - WHY now: bearer compromise directly enables account takeover on protected goal
    and pledge flows.

    - WHY this direction is actionable: `explore: true` provides enough backpressure
    even though no `flow.md` or `api_spec.md` was attached.

    - WHY this should split: token policy, claim enforcement, and refresh replay defense
    are separable slices that can land independently and reduce risk incrementally.


    ## Acceptance criteria from direction

    - [ ] Access and refresh token policy documented and enforced in backend auth
    middleware

    - [ ] Refresh token rotation with revocation implemented and tested for replay
    attempts

    - [ ] Protected endpoints reject tokens with invalid issuer/audience/expiry


    ## PM triage notes

    - Type: security

    - Priority: p2

    - Backpressure: sufficient via `explore: true`

    - Key product question answered by this work: how do we make stolen tokens expire
    quickly, fail claim checks, and become unusable after refresh replay?

    - Likely implementation center of gravity is backend auth issuance/validation
    plus tests; no frontend dependency is required to realize user value.


    ## Proposed execution shape

    Sequence the work as: policy/documentation baseline first, then claim enforcement
    on protected routes, then refresh rotation + revocation/replay tests. That ordering
    gives downstream devs a stable contract before touching refresh-state behavior.'
  child_stories:
  - title: D082 document access/refresh token policy in canonical auth docs
    scope: docs
    chain_kind: docs
    rationale: 'WHY first: the direction explicitly requires policy to be documented,
      and dev needs a crisp contract for token lifetime, intended claims, and refresh
