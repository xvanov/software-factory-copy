      auto-stop, retake/confirm UX, and the denied-permission unit test.
  - title: Build D008 backend video upload API and media storage service
    scope: backend
    chain_kind: tdd
    rationale: WHY isolate backend work? The upload endpoint, ownership checks, persistence
