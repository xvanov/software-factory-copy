  tracker_title: D008 camera-capture-pipeline upload + Expo capture
  tracker_body: '## Summary

    D008 adds the shared camera-capture and video-upload infrastructure needed before
    physical-world proof flows can work end to end. WHY now: pushup-counter and later
    sensor-backed goal types need one reusable capture component and one backend upload
    path instead of bespoke media plumbing per goal type.


    ## What the direction explicitly requires

    - Reusable `frontend/components/CameraCapture.tsx`

    - Permission handling for camera + microphone, including denied state with open-settings
    and cancel actions

    - Recording UX: start/stop, elapsed timer, optional max duration, retake/confirm

    - Backend `POST /api/uploads/video` multipart endpoint per `api_spec.md`

    - Backend `GET /api/uploads/{upload_id}` ownership-scoped metadata endpoint

    - `media_uploads` table with upload metadata persisted via Alembic migration

    - Configurable storage root in `backend/app/config.py`

    - `backend/app/services/uploads.py` service encapsulating write/path/hash/persistence

    - E2E smoke test for API upload

    - Frontend unit test for denied-permission rendering

    - Docs updates in `context/modules/media.md` and `context/architecture-diagrams.md`


    ## WHY this splits into multiple stories

    Because bundling camera UI, migration, storage service, API routes, smoke coverage,
    and docs into one backend/frontend lump would exceed the chain''s single-sandbox
    limits. The safest path is thin vertical slices where each PR adds usable value
    or de-risks the next PR.


    ## Proposed sequence

    1. Land storage config + persistence model + migration first so uploads have somewhere
    canonical to persist.

    2. Land upload service next so route logic stays thin and testable.

    3. Land POST upload endpoint on top of the service.

    4. Land GET metadata endpoint once records exist.

    5. Land backend smoke coverage for POST upload behavior.

    6. Land frontend denied-permission slice first because permission failure is the
    sharpest UX edge.

    7. Land reusable recording component behavior once permission shell exists.

    8. Land docs after the code paths are real.


    ## Key product questions already answered by the direction

    - WHY shared infra instead of goal-specific wiring? Reuse across future sensor/media
    proof types.

    - WHY now? D010 validation should not be blocked on proving camera plumbing at
    the same time.

    - WHY whole-file multipart only? Streaming and server-side media processing are
    explicitly out of scope.


    ## Non-goals to preserve

    - Do not wire this into a specific goal-type proof flow in this direction.

    - Do not add transcoding, frame extraction, or CV analysis.

    - Do not treat local-save/retry UX from `flow.md` as required acceptance unless
    separately directed in code scope; the hard acceptance here is the reusable capture
    component and backend upload pipeline.'
