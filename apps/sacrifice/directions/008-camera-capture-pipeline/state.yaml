      backend slice with clear API acceptance criteria.
  - title: Add D008 upload smoke coverage and media context docs
    scope: test
    chain_kind: tdd
    rationale: WHY separate verification/documentation? The direction explicitly requires
      an API smoke test plus new media context and architecture updates; these validate
      the contract and make the new subsystem legible to future work.
