  tracker_title: D084 lock down goal-type module discovery and loading
  tracker_body: '## Summary

    Lock down backend goal-type discovery so the registry only loads allowlisted modules
    from trusted paths, startup hard-fails on integrity or interface validation failures,
    and security logging captures both module load decisions and verifier exceptions.


    ## Why / PM backpressure check

    - WHY now: current project context says goal-type discovery already auto-discovers
    packages from the filesystem. That is the attack surface this direction is targeting.

    - WHY this scope: the acceptance criteria are backend-runtime security controls,
    not frontend UX.

    - WHY split: registry hardening, startup fail-fast behavior, and logging/verifier
    observability are related but distinct vertical slices. Bundling them risks one
    oversized backend story.


    ## Acceptance Criteria from direction

    - [ ] Goal-type registry only loads allowlisted modules from trusted paths

    - [ ] Startup fails if module integrity checks or interface validation fail

    - [ ] Security logging records module load decisions and verifier exceptions


    ## Notes for implementation sequencing

    1. Land trusted discovery policy first so there is a clear contract for what is
    eligible to load.

    2. Then add fail-fast startup validation so bad modules block boot rather than
    failing later during request handling.

    3. Then add security logging around both discovery decisions and verifier exception
    paths for operational visibility.


    ## Risks / open questions

    - The direction does not specify the exact allowlist source of truth or integrity
    mechanism. Dev should implement the smallest repo-local policy that satisfies
    the criteria without inventing broader product behavior.

    - Logging should be security-relevant and structured enough for operators, but
    must avoid leaking sensitive proof payloads.

    '
