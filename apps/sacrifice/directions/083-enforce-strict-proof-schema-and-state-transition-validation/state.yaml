    rationale: 'Second slice for AC2. WHY separate: transition legality is a distinct
      policy layer from payload shape. Add explicit guardrails for illegal proof/status
      changes with API-level test coverage so downstream charging logic cannot be
      bypassed through invalid state progression.'
    estimated_new_files: 1
