  tracker_title: D083 enforce strict proof schema/state validation
  tracker_body: '## Summary

    Direction D083 aims to close an abuse path in proof submission by enforcing strict
    goal-type proof validation and rejecting illegal proof/status transitions before
    they can affect pledge outcomes.


    ## Why

    Weak proof validation can be abused to avoid legitimate pledge charging and undermines
    platform trust.


    ## Acceptance Criteria

    - [ ] Server validates proof payload against goal-type-specific schema before
    persistence

    - [ ] Illegal proof/status transitions are rejected with test coverage

    - [ ] Audit events capture rejected and accepted proof validation outcomes


    ## PM triage

    - WHY now: proof submission is currently JSON-only and the backend accepts a flat
    proof model while goal types already expose metadata; that is a trust boundary
    and therefore a security surface.

    - WHY backend-first: every listed acceptance criterion is server-side and observable
    via API behavior or audit persistence.

    - WHY split: schema enforcement, transition guards, and audit logging are separable
    vertical slices; bundling them would likely touch too many files and increase
    retry risk.

    - WHY no frontend story: the direction does not ask for client UX changes, and
    server-side enforcement should land independently.


    ## Notes for downstream

    - Reuse existing goal-type registry/discovery where possible rather than introducing
    a parallel proof-validation mechanism.

    - Keep transitions explicit and testable; avoid vibes-based "invalid state" handling.

    - Audit logging must cover both accept and reject outcomes, not only failures.'
  child_stories:
  - title: D083 add goal-type proof schema validation on submission
    scope: backend
    chain_kind: tdd
    rationale: 'First vertical slice for AC1. WHY first: if proof payload is not validated
      before persistence, every later state/audit rule operates on bad data. Implement
      backend submission-path validation using the existing goal-type metadata/registry
      seam and add focused tests for valid vs invalid payloads.'
    estimated_new_files: 1
