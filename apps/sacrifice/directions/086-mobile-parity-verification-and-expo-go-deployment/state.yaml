  tracker_title: D086 mobile parity verification and Expo Go deployment
  tracker_body: '## Summary

    D086 targets native mobile parity for Sacrifice without breaking web: unify API/config
    handling around `EXPO_PUBLIC_API_URL`, add an automated guard against unguarded
    web-only APIs, land native proof capture/upload, add a Maestro-backed Android
    emulator harness, provide Expo Go tunnel serving for iPhone use, add an in-app
    diagnostics screen, and document the operator runbook.


    ## Why / backpressure check

    - WHY now: recent product work was only exercised through `expo start --web`;
    native runtime divergence is likely.

    - WHY sufficient to spawn: `flow.md` exists and `explore: true` is set.

    - WHY this shape: the direction already gives sequencing guidance and explicit
    acceptance criteria. The fastest path is to split by smallest end-to-end slices
    that unblock later verification.


    ## Constraints that must govern every story

    - Linux host only; no Xcode, no iOS simulator, no EAS requirement.

    - Native verification is Android emulator + Maestro; iPhone truth is via Expo
    Go over tunnel.

    - Backend must be reached through configurable `EXPO_PUBLIC_API_URL`; no hardcoded
    localhost in app code.

    - Web target must remain green; divergence belongs behind platform guards or file
    splits.

    - Host tools (`adb`, emulator, Maestro, `cloudflared`) are operator-provisioned
    and out of scope.

    - Reuse `scripts/smoke_journey.py` semantics for backend boot in mobile E2E.


    ## Acceptance criteria mapping

    - AC1: parity audit tooling + native-compatible implementations in core shared
    paths.

    - AC2: single API client/config path + native/web token storage parity.

    - AC3: `make mobile-e2e` + Maestro flows under `e2e/mobile/`.

    - AC4: native camera/media proof capture + upload + Maestro coverage.

    - AC5: `make mobile-serve` + status + persisted tunnel connection info.

    - AC6: dev-only diagnostics screen.

    - AC7: operator runbook in `context/mobile-runbook.md`.

    - AC8: emulator full journey against public tunnel URL.


    ## PM decomposition notes

    - WHY split config from audit: both unblock everything else, but each is independently
    landable and reviewable.

    - WHY split proof UI from upload transport: native camera affordance and multipart/upload
    plumbing are separable risk buckets.

    - WHY split Maestro plumbing from journey expansion: direction explicitly says
    land one flow first, then extend.

    - WHY keep docs separate: docs-only output belongs on the docs chain.

    - WHY keep tunnel verification separate from harness creation: proving localhost
    works is not the same as proving public tunnel path works.


    ## Risks / watchouts

    - Native proof capture likely forces multipart/form-data support and may touch
    both frontend and backend assumptions about JSON-only proof submission.

    - Expo Go service automation may be sensitive to local CLI behavior; stories should
    focus on deterministic wrapper/service behavior, not ad hoc shell usage.

    - The parity audit must be precise enough to catch real regressions without flagging
    valid guarded code endlessly.


    ## Spawn order intent

    1. API URL/config client unification.

    2. Secure token storage native/web split.

    3. Parity audit guardrail.

    4. Native-compatible goal creation path using registry metadata where needed.

    5. Proof upload transport for native media.

    6. Native camera/library proof UI.

    7. Maestro harness plumbing with one smoke flow.

    8. Extend Maestro to core journey including proof.

    9. Expo Go serve/status service.

    10. Dev diagnostics screen.

    11. Runbook docs.

    12. Tunnel-targeted full journey verification.

    '
