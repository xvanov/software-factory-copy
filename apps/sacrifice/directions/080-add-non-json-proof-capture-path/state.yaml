  tracker_title: D080 add-non-json-proof-capture-path
  tracker_body: '## Summary

    Add at least one non-JSON proof submission path so users can submit evidence in
    a format that matches real-world proof capture instead of hand-authoring JSON.


    ## Why

    - Current proof submission is JSON-only.

    - Users commonly have evidence as photos or files, not structured text payloads.

    - The direction explicitly asks for one non-JSON input method accepted end-to-end
    by client and backend.


    ## What matters

    - WHY this exists: reduce friction in proof submission for evidence formats users
    already have.

    - WHY this should be small first: acceptance criteria only require at least one
    non-JSON method, not every possible media workflow.

    - WHY camera may be riskier than picker: current Expo config has no camera/upload
    path enabled; file/image selection is likely the smallest viable slice.


    ## Acceptance criteria from direction

    - The proof flow offers at least one non-JSON evidence input method such as camera
    capture or file upload.

    - Submitted non-JSON proof is accepted end-to-end by the client and backend.


    ## PM decomposition notes

    - Start with backend multipart/file acceptance so the system can actually receive
    non-JSON proof.

    - Then expose one client capture path that uses that backend contract.

    - Keep docs separate.

    - Do not bundle multiple acquisition methods in one story; one working non-JSON
    path satisfies the direction.

    '
  child_stories:
