  tracker_title: D079 use backend goal-type metadata in goal creation
  tracker_body: '## Summary

    D079 asks to remove the frontend dead-end caused by hardcoded goal-type options
    and instead drive goal creation from backend metadata exposed at `/api/goal-types`.


    ## Why / PM triage

    - WHY does this matter? Because the backend already knows the canonical set of
    supported goal types, but the mobile creation flow ignores that source of truth.

    - WHY is that harmful? Because a backend-registered type can be valid yet remain
    impossible for a user to select.

    - WHY now? Because the registry seam already exists in the backend; the user-facing
    gap is specifically the creation picker.


    ## Acceptance criteria from direction

    - Goal creation fetches and renders options from `/api/goal-types` instead of
    local constants.

    - A backend-registered goal type appears in the picker without changing frontend
    source lists.


    ## Notes for implementation

    - Current context says `/api/goal-types` already exists and returns `name`, `description`,
    `sample_prompts`, and `criteria_schema`.

    - This direction is frontend-facing UX work, but the change should preserve existing
    goal creation behavior for the four built-in types while switching the picker
    to backend-provided metadata.

    - Keep slices small: first add API consumption and rendering, then prove dynamic
    behavior through a focused test slice if needed.

    '
  child_stories:
