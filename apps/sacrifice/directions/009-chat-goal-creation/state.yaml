  tracker_title: D009 chat-goal-creation replaces typed goal form
  tracker_body: '## Summary

    D009 replaces typed goal creation with a chat-driven flow. WHY: users should describe
    intent in natural language instead of pre-selecting a goal type. The direction
    is explicit that proof submission stays unchanged in this batch, while creation
    moves to a new chat surface backed by one LLM match call per turn against the
    D007 goal-type registry.


    ## Backpressure check

    - `flow.md`: present

    - `api_spec.md`: present

    - `explore: false`

    - Result: sufficient backpressure


    ## What must land

    - New primary frontend creation screen: `ChatGoalCreateScreen.tsx`

    - Home screen and internal navigation updated to route to chat creation

    - Legacy `GoalCreateScreen.tsx` removed

    - New backend `chat.py` route module mounted in `backend/app/main.py`

    - Chat session persistence via new `chat_sessions` table + Alembic migration

    - LLM match service at `backend/app/services/chat_match.py` with configurable
    model id and confidence threshold

    - Backend chat flow that proposes built-in goal type matches, asks for missing
    criteria conversationally, and creates the goal via existing `POST /api/goals`

    - Stubbed `request-new-goal-type` endpoint returning `501` for D010 handoff

    - E2E smoke coverage for matched path and no-match path

    - Context docs updated for frontend and backend app modules


    ## Product edges to preserve

    - WHY keep proof screens untouched? Because this direction only replaces creation,
    not proof submission.

    - WHY persist chat sessions? Because flow requires resume-on-return on the same
    device.

    - WHY split the work? Because route + persistence + LLM matching + conversational
    draft filling + frontend replacement + E2E is too large for one dev slice.


    ## Sequencing notes

    1. Land persistence and API skeleton first so the frontend has a stable contract.

    2. Land LLM match service and message endpoint behavior next.

    3. Land create-goal handoff after draft assembly exists.

    4. Land frontend screen and navigation replacement after API shape is present.

    5. Land no-match stub affordance and 501 UX.

    6. Land smoke E2E and docs last.


    ## Acceptance criteria source

    All acceptance criteria are taken directly from `direction.md`, `flow.md`, and
    `api_spec.md`; none invented here.'
