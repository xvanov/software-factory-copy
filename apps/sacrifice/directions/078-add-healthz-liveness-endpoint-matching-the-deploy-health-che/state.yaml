  tracker_title: D078 add /healthz liveness endpoint for deploy checks
  tracker_body: '## Summary

    WHY is this needed? The deploy config probes `GET /healthz`, but the backend only
    exposes `GET /api/health`. That means deploy liveness verification fails even
    when the app is healthy, which can trigger rollback of an otherwise good release.


    ## Direction

    Add an unauthenticated `GET /healthz` endpoint that returns `200` with `{"status":
    "ok"}` and preserves existing `GET /api/health` behavior.


    ## Acceptance Criteria

    - [ ] `GET /healthz` returns `200` with JSON body `{"status": "ok"}`

    - [ ] `GET /healthz` requires no authentication

    - [ ] A backend test covers `GET /healthz` returning `200` and status ok

    - [ ] Existing `GET /api/health` continues to return `200`


    ## Product framing

    WHY now? Because this is not a nice-to-have endpoint; it is the contract the deploy
    gate already expects. The smallest useful fix is to make runtime behavior match
    deploy expectations without changing the deploy config.


    ## Delivery notes

    Single vertical slice: wire `/healthz` to the existing health logic and cover
    both the new liveness path and the existing API health path in backend tests.'
  child_stories:
  - title: D078 add backend /healthz route reusing health handler
    scope: backend
    chain_kind: tdd
    rationale: 'WHY split further? There is no meaningful smaller user-valued slice
      than exposing the liveness endpoint and proving the existing `/api/health` contract
      still holds. This should be one PR: route wiring plus tests, likely touching
      only the main app/router file and one backend test file.'
