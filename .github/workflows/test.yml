name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"
      - name: uv sync
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check factory/ tests/ bench/

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"
      - name: uv sync
        run: uv sync --all-extras
      # BLOCKING on the verification-truth code (factory/chain/gates/): this is
      # the code that decides whether a PR is safe to merge, so it must not
      # accrue type debt. The job FAILS if this subset regresses (WS1.6,
      # 2026-07-19). The rest of factory/ carries ~85 pre-existing findings and
      # is still surfaced as an advisory count until that debt is paid down.
      - name: mypy (blocking on chain/gates)
        run: uv run mypy factory/chain/gates/
      - name: mypy (advisory, package-wide)
        if: always()
        run: |
          uv run mypy factory/ > mypy.out 2>&1 || true
          tail -3 mypy.out
          COUNT=$(grep -c "error:" mypy.out || true)
          echo "::warning::mypy: ${COUNT} package-wide findings (advisory — tracked debt)"

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # python-coverage-comment-action stores badge data on a repo branch
      # (push to main) and comments coverage on PRs.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: uv sync --all-extras
        run: uv sync --all-extras

      - name: pytest with coverage
        run: uv run pytest -q --tb=short --cov=factory --cov-report=

      - name: Coverage comment + badge
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
