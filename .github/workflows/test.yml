name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"
      - name: uv sync
        run: uv sync --all-extras
      - name: ruff check
        run: uv run ruff check factory/ tests/ bench/

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory until the 78 pre-existing package-wide mypy findings are paid
    # down (2026-07-18) — per-module strictness is enforced in review instead.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"
      - name: uv sync
        run: uv sync --all-extras
      - name: mypy
        run: uv run mypy factory/

  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # python-coverage-comment-action stores badge data on a repo branch
      # (push to main) and comments coverage on PRs.
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: uv sync --all-extras
        run: uv sync --all-extras

      - name: pytest with coverage
        run: uv run pytest -q --tb=short --cov=factory --cov-report=

      - name: Coverage comment + badge
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60
